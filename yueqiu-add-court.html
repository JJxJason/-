<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>约球星球 - 添加球馆</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .page-title {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }
        
        .page-subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .btn-back:hover {
            background: rgba(255,255,255,0.2);
            border-color: var(--primary-color);
        }
        
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-label {
            display: block;
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .form-label .required {
            color: #ff4e50;
            margin-left: 3px;
        }
        
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            border-color: var(--primary-color);
        }
        
        .form-input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .form-select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .form-select:focus {
            border-color: var(--primary-color);
        }
        
        .form-select option {
            background: #1a1a2e;
            color: #fff;
        }
        
        .form-textarea {
            width: 100%;
            min-height: 100px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px 15px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            resize: vertical;
            font-family: inherit;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        .form-textarea:focus {
            border-color: var(--primary-color);
        }
        
        .form-checkbox-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .form-checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .form-checkbox-item:hover {
            background: rgba(255,255,255,0.08);
        }
        
        .form-checkbox-item.checked {
            background: rgba(249,212,35,0.15);
            border-color: var(--primary-color);
        }
        
        .form-checkbox-item input {
            display: none;
        }
        
        .form-checkbox-item .checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .form-checkbox-item.checked .checkmark {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }
        
        .form-checkbox-item.checked .checkmark::after {
            content: '✓';
            color: #000;
            font-size: 12px;
            font-weight: bold;
        }
        
        .form-checkbox-item .label-text {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
        }
        
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        
        .btn {
            flex: 1;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #f9d423, #ff4e50);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(249,212,35,0.3);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }
        
        .court-list {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .court-list::-webkit-scrollbar {
            width: 6px;
        }
        
        .court-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
        }
        
        .court-list::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
        }
        
        .court-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        
        .court-item:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(249,212,35,0.3);
        }
        
        .court-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .court-item-name {
            color: #fff;
            font-weight: bold;
            font-size: 1rem;
        }
        
        .court-item-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            background: rgba(249,212,35,0.2);
            color: #f9d423;
        }
        
        .court-item-info {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .court-item-facilities {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }
        
        .facility-tag {
            padding: 3px 8px;
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
        }
        
        .court-item-actions {
            display: flex;
            gap: 8px;
        }
        
        .court-item-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            text-align: center;
        }
        
        .court-item-btn.edit {
            background: rgba(96,165,250,0.2);
            color: #60a5fa;
            border: 1px solid rgba(96,165,250,0.3);
        }
        
        .court-item-btn.edit:hover {
            background: rgba(96,165,250,0.3);
        }
        
        .court-item-btn.delete {
            background: rgba(231,76,60,0.2);
            color: #e74c3c;
            border: 1px solid rgba(231,76,60,0.3);
        }
        
        .court-item-btn.delete:hover {
            background: rgba(231,76,60,0.3);
        }
        
        .empty-list {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255,255,255,0.4);
        }
        
        .empty-list-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        
        .empty-list-text {
            font-size: 0.95rem;
        }
        
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px 15px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        
        .search-input:focus {
            border-color: var(--primary-color);
        }
        
        .search-input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-item {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        .tab-item.active {
            background: rgba(249,212,35,0.15);
            border-color: var(--primary-color);
            color: #f9d423;
        }
        
        .tab-item:hover:not(.active) {
            background: rgba(255,255,255,0.1);
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-value {
            color: #f9d423;
            font-size: 1.5rem;
            font-weight: bold;
        }
        
        .stat-label {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            margin-top: 3px;
        }
        
        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .form-checkbox-group {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-20px); opacity: 0; }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.95);
            color: #fff;
            padding: 12px 24px;
            border-radius: 25px;
            z-index: 99999;
            font-size: 0.95rem;
            animation: slideDown 0.3s ease;
        }
        
        .toast.error {
            background: rgba(231, 76, 60, 0.95);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s;
        }
        
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        
        .modal-header {
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }
        
        .modal-header .close-btn {
            cursor: pointer;
            color: rgba(255,255,255,0.5);
            font-size: 1.2rem;
            transition: color 0.3s;
        }
        
        .modal-header .close-btn:hover {
            color: #fff;
        }
        
        .modal-body {
            padding: 25px;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="logo">🏸 约球星球</div>
        <div class="nav-links">
            <a href="yueqiuxingqiu.html">首页</a>
            <a href="yueqiu-group.html">找球局</a>
            <a href="yueqiu-court.html">球馆</a>
            <a href="yueqiu-profile.html">我的</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <div>
                <div class="page-title">📍 添加球馆</div>
                <div class="page-subtitle">帮助完善我们的球馆数据库，让更多球友受益</div>
            </div>
            <a href="yueqiu-court.html" class="btn-back">← 返回球馆列表</a>
        </div>

        <div class="content-grid">
            <div class="card">
                <div class="card-title">🏢 球馆信息</div>
                
                <form id="court-form">
                    <div class="form-group">
                        <label class="form-label">球馆名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="court-name" placeholder="例如：XX体育中心羽毛球馆" maxlength="50">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">城市 <span class="required">*</span></label>
                            <select class="form-select" id="court-city" onchange="updateDistricts()">
                                <option value="">请选择城市</option>
                                <option value="北京">北京</option>
                                <option value="上海">上海</option>
                                <option value="深圳">深圳</option>
                                <option value="广州">广州</option>
                                <option value="成都">成都</option>
                                <option value="杭州">杭州</option>
                                <option value="武汉">武汉</option>
                                <option value="南京">南京</option>
                                <option value="西安">西安</option>
                                <option value="重庆">重庆</option>
                                <option value="天津">天津</option>
                                <option value="苏州">苏州</option>
                                <option value="青岛">青岛</option>
                                <option value="长沙">长沙</option>
                                <option value="郑州">郑州</option>
                                <option value="东莞">东莞</option>
                                <option value="福州">福州</option>
                                <option value="厦门">厦门</option>
                                <option value="其他">其他城市</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">区域 <span class="required">*</span></label>
                            <select class="form-select" id="court-district">
                                <option value="">请先选择城市</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">详细地址 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="court-address" placeholder="例如：XX区XX路XX号" maxlength="100">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">人均价格（元/人）</label>
                            <input type="number" class="form-input" id="court-price" placeholder="30" min="0" max="500">
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话</label>
                            <input type="tel" class="form-input" id="court-phone" placeholder="010-XXXXXXXX" maxlength="20">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">交通指引</label>
                        <input type="text" class="form-input" id="court-transit" placeholder="例如：地铁X号线XX站B出口步行500米" maxlength="100">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">开放时间</label>
                        <input type="text" class="form-input" id="court-hours" placeholder="例如：周一至周日 08:00-22:00" maxlength="50">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">场地数量</label>
                        <select class="form-select" id="court-count">
                            <option value="">请选择</option>
                            <option value="1-4片">1-4片</option>
                            <option value="5-8片">5-8片</option>
                            <option value="9-12片">9-12片</option>
                            <option value="13-20片">13-20片</option>
                            <option value="20片以上">20片以上</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">设施服务</label>
                        <div class="form-checkbox-group" id="facilities-group">
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="空调">
                                <span class="checkmark"></span>
                                <span class="label-text">空调</span>
                            </div>
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="淋浴">
                                <span class="checkmark"></span>
                                <span class="label-text">淋浴</span>
                            </div>
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="停车场">
                                <span class="checkmark"></span>
                                <span class="label-text">停车场</span>
                            </div>
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="更衣室">
                                <span class="checkmark"></span>
                                <span class="label-text">更衣室</span>
                            </div>
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="WiFi">
                                <span class="checkmark"></span>
                                <span class="label-text">WiFi</span>
                            </div>
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="器材租借">
                                <span class="checkmark"></span>
                                <span class="label-text">器材租借</span>
                            </div>
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="专业灯光">
                                <span class="checkmark"></span>
                                <span class="label-text">专业灯光</span>
                            </div>
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="地暖">
                                <span class="checkmark"></span>
                                <span class="label-text">地暖</span>
                            </div>
                            <div class="form-checkbox-item" onclick="toggleCheck(this)">
                                <input type="checkbox" name="facility" value="休息区">
                                <span class="checkmark"></span>
                                <span class="label-text">休息区</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">简介说明</label>
                        <textarea class="form-textarea" id="court-desc" placeholder="介绍一下球馆的特点、优势、环境等..." maxlength="300"></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">重置</button>
                        <button type="submit" class="btn btn-primary">提交球馆</button>
                    </div>
                </form>
            </div>
            
            <div class="card">
                <div class="card-title">📋 我添加的球馆</div>
                
                <div class="stats-bar" id="stats-bar">
                    <div class="stat-item">
                        <div class="stat-value" id="stat-total">0</div>
                        <div class="stat-label">累计添加</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-this-month">0</div>
                        <div class="stat-label">本月新增</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="stat-cities">0</div>
                        <div class="stat-label">覆盖城市</div>
                    </div>
                </div>
                
                <div class="search-bar">
                    <input type="text" class="search-input" id="search-input" placeholder="搜索球馆名称..." oninput="filterCourts()">
                </div>
                
                <div class="tab-bar">
                    <div class="tab-item active" onclick="switchTab('all')">全部</div>
                    <div class="tab-item" onclick="switchTab('pending')">待审核</div>
                    <div class="tab-item" onclick="switchTab('approved')">已通过</div>
                </div>
                
                <div class="court-list" id="court-list">
                    <div class="empty-list">
                        <div class="empty-list-icon">🏸</div>
                        <div class="empty-list-text">还没有添加任何球馆<br>填写左侧表单开始添加吧</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="edit-modal">
        <div class="modal">
            <div class="modal-header">
                编辑球馆
                <div class="close-btn" onclick="closeEditModal()">✕</div>
            </div>
            <div class="modal-body" id="edit-modal-body">
            </div>
        </div>
    </div>

    <script>
        const cityDistrictMap = {
            '北京': ['东城区', '西城区', '朝阳区', '海淀区', '丰台区', '石景山区', '通州区', '顺义区', '大兴区', '昌平区', '房山区', '门头沟区', '平谷区', '怀柔区', '密云区', '延庆区'],
            '上海': ['黄浦区', '徐汇区', '长宁区', '静安区', '普陀区', '虹口区', '杨浦区', '闵行区', '宝山区', '嘉定区', '浦东新区', '金山区', '松江区', '青浦区', '奉贤区', '崇明区'],
            '深圳': ['福田区', '罗湖区', '南山区', '盐田区', '宝安区', '龙岗区', '龙华区', '坪山区', '光明区', '大鹏新区'],
            '广州': ['越秀区', '海珠区', '荔湾区', '天河区', '白云区', '黄埔区', '番禺区', '花都区', '南沙区', '增城区', '从化区'],
            '成都': ['锦江区', '青羊区', '金牛区', '武侯区', '成华区', '龙泉驿区', '青白江区', '新都区', '温江区', '双流区', '郫都区', '大邑县', '蒲江县', '新津县', '简阳市', '都江堰市', '彭州市', '邛崃市', '崇州市'],
            '杭州': ['上城区', '下城区', '江干区', '拱墅区', '西湖区', '滨江区', '萧山区', '余杭区', '富阳区', '临安区', '桐庐县', '淳安县'],
            '武汉': ['江岸区', '江汉区', '硚口区', '汉阳区', '武昌区', '青山区', '洪山区', '东西湖区', '汉南区', '蔡甸区', '江夏区', '黄陂区', '新洲区'],
            '南京': ['玄武区', '秦淮区', '建邺区', '鼓楼区', '栖霞区', '雨花台区', '江宁区', '浦口区', '六合区', '溧水区', '高淳区'],
            '西安': ['新城区', '碑林区', '莲湖区', '灞桥区', '未央区', '雁塔区', '阎良区', '临潼区', '长安区', '高陵区', '鄠邑区', '蓝田县', '周至县'],
            '重庆': ['万州区', '渝中区', '江北区', '沙坪坝区', '九龙坡区', '南岸区', '北碚区', '渝北区', '巴南区', '涪陵区', '长寿区', '璧山区', '开州区', '梁平区', '武隆区'],
            '天津': ['和平区', '河东区', '河西区', '南开区', '河北区', '红桥区', '东丽区', '西青区', '津南区', '北辰区', '武清区', '宝坻区', '滨海新区', '宁河区', '静海区', '蓟州区'],
            '苏州': ['姑苏区', '虎丘区', '吴中区', '相城区', '工业园区', '高新区', '吴江区', '常熟市', '张家港市', '昆山市', '太仓市'],
            '青岛': ['市南区', '市北区', '黄岛区', '崂山区', '李沧区', '城阳区', '即墨区', '胶州市', '平度市', '莱西市'],
            '长沙': ['芙蓉区', '天心区', '岳麓区', '开福区', '雨花区', '望城区', '长沙县', '浏阳市', '宁乡市'],
            '郑州': ['中原区', '二七区', '管城区', '金水区', '上街区', '惠济区', '中牟县', '巩义市', '荥阳市', '新密市', '新郑市', '登封市'],
            '东莞': ['莞城区', '南城区', '东城区', '万江区', '石碣镇', '石龙镇', '茶山镇', '石排镇', '企石镇', '横沥镇', '桥头镇', '谢岗镇', '东坑镇', '常平镇', '寮步镇', '大朗镇', '麻涌镇', '中堂镇', '高埗镇', '樟木头镇', '大岭山镇', '望牛墩镇', '黄江镇', '洪梅镇', '清溪镇', '沙田镇', '道滘镇', '塘厦镇', '虎门镇', '厚街镇', '长安镇'],
            '福州': ['鼓楼区', '台江区', '仓山区', '马尾区', '晋安区', '长乐区', '闽侯县', '连江县', '罗源县', '闽清县', '永泰县', '平潭县', '福清市'],
            '厦门': ['思明区', '海沧区', '湖里区', '集美区', '同安区', '翔安区'],
            '其他': ['其他']
        };

        let editingCourtId = null;
        let currentTab = 'all';
        let searchKeyword = '';

        function updateDistricts() {
            const city = document.getElementById('court-city').value;
            const districtSelect = document.getElementById('court-district');
            districtSelect.innerHTML = '<option value="">请选择区域</option>';
            
            if (city && cityDistrictMap[city]) {
                cityDistrictMap[city].forEach(district => {
                    const option = document.createElement('option');
                    option.value = district;
                    option.textContent = district;
                    districtSelect.appendChild(option);
                });
            }
        }

        function toggleCheck(el) {
            el.classList.toggle('checked');
            const input = el.querySelector('input');
            input.checked = !input.checked;
        }

        function showToast(message, type) {
            const typeClass = type === 'error' ? ' error' : '';
            const toast = document.createElement('div');
            toast.className = 'toast' + typeClass;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        function resetForm() {
            document.getElementById('court-form').reset();
            document.querySelectorAll('.form-checkbox-item.checked').forEach(el => {
                el.classList.remove('checked');
                el.querySelector('input').checked = false;
            });
            document.getElementById('court-district').innerHTML = '<option value="">请先选择城市</option>';
        }

        function getFormData() {
            const name = document.getElementById('court-name').value.trim();
            const city = document.getElementById('court-city').value;
            const district = document.getElementById('court-district').value;
            const address = document.getElementById('court-address').value.trim();
            const price = document.getElementById('court-price').value;
            const phone = document.getElementById('court-phone').value.trim();
            const transit = document.getElementById('court-transit').value.trim();
            const hours = document.getElementById('court-hours').value.trim();
            const courtCount = document.getElementById('court-count').value;
            const desc = document.getElementById('court-desc').value.trim();
            
            const facilities = [];
            document.querySelectorAll('#facilities-group input:checked').forEach(input => {
                facilities.push(input.value);
            });
            
            return {
                id: 'COURT' + Date.now(),
                name,
                city,
                district,
                address,
                price: price ? parseInt(price) : 0,
                phone,
                transit,
                hours,
                courtCount,
                facilities,
                desc,
                status: 'pending',
                createTime: Date.now(),
                creator: localStorage.getItem('yueqiu_username') || '匿名用户'
            };
        }

        function validateForm(data) {
            if (!data.name) {
                showToast('请输入球馆名称', 'error');
                return false;
            }
            if (!data.city) {
                showToast('请选择城市', 'error');
                return false;
            }
            if (!data.district) {
                showToast('请选择区域', 'error');
                return false;
            }
            if (!data.address) {
                showToast('请输入详细地址', 'error');
                return false;
            }
            return true;
        }

        document.getElementById('court-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = getFormData();
            
            if (!validateForm(data)) return;
            
            const courts = JSON.parse(localStorage.getItem('myAddedCourts') || '[]');
            courts.unshift(data);
            localStorage.setItem('myAddedCourts', JSON.stringify(courts));
            
            resetForm();
            renderCourtList();
            updateStats();
            
            showToast('球馆提交成功！等待审核通过');
        });

        function getCourts() {
            return JSON.parse(localStorage.getItem('myAddedCourts') || '[]');
        }

        function updateStats() {
            const courts = getCourts();
            const now = new Date();
            const thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
            
            const thisMonthCount = courts.filter(c => {
                const d = new Date(c.createTime);
                const m = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                return m === thisMonth;
            }).length;
            
            const cities = new Set(courts.map(c => c.city)).size;
            
            document.getElementById('stat-total').textContent = courts.length;
            document.getElementById('stat-this-month').textContent = thisMonthCount;
            document.getElementById('stat-cities').textContent = cities;
        }

        function filterCourts() {
            searchKeyword = document.getElementById('search-input').value.trim().toLowerCase();
            renderCourtList();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderCourtList();
        }

        function renderCourtList() {
            let courts = getCourts();
            
            if (currentTab === 'pending') {
                courts = courts.filter(c => c.status === 'pending');
            } else if (currentTab === 'approved') {
                courts = courts.filter(c => c.status === 'approved');
            }
            
            if (searchKeyword) {
                courts = courts.filter(c => 
                    c.name.toLowerCase().includes(searchKeyword) ||
                    c.city.toLowerCase().includes(searchKeyword) ||
                    c.district.toLowerCase().includes(searchKeyword)
                );
            }
            
            const container = document.getElementById('court-list');
            
            if (courts.length === 0) {
                container.innerHTML = `
                    <div class="empty-list">
                        <div class="empty-list-icon">🏸</div>
                        <div class="empty-list-text">${searchKeyword ? '没有找到匹配的球馆' : '还没有添加任何球馆<br>填写左侧表单开始添加吧'}</div>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = courts.map(court => {
                const statusMap = {
                    'pending': { text: '待审核', class: 'background: rgba(251,191,36,0.2); color: #fbb36b;' },
                    'approved': { text: '已通过', class: 'background: rgba(46,204,113,0.2); color: #2ecc71;' }
                };
                const status = statusMap[court.status] || statusMap['pending'];
                
                const facilitiesHtml = court.facilities.map(f => 
                    `<span class="facility-tag">${f}</span>`
                ).join('');
                
                const date = new Date(court.createTime);
                const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
                
                return `
                    <div class="court-item">
                        <div class="court-item-header">
                            <div class="court-item-name">${court.name}</div>
                            <div class="court-item-badge" style="${status.class}">${status.text}</div>
                        </div>
                        <div class="court-item-info">
                            📍 ${court.city} ${court.district} ${court.address}<br>
                            ${court.price > 0 ? '💰 人均约' + court.price + '元' : ''} ${court.phone ? '📞 ' + court.phone : ''}
                        </div>
                        ${court.facilities.length > 0 ? `<div class="court-item-facilities">${facilitiesHtml}</div>` : ''}
                        <div style="color: rgba(255,255,255,0.3); font-size: 0.75rem; margin-bottom: 10px;">添加于 ${dateStr}</div>
                        <div class="court-item-actions">
                            ${court.status === 'pending' ? `
                                <button class="court-item-btn edit" onclick="approveCourt('${court.id}')">✓ 通过</button>
                                <button class="court-item-btn delete" onclick="rejectCourt('${court.id}')">✕ 驳回</button>
                            ` : ''}
                            ${court.status === 'approved' ? `
                                <button class="court-item-btn edit" onclick="editCourt('${court.id}')">编辑</button>
                                <button class="court-item-btn delete" onclick="revokeCourt('${court.id}')">撤回</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function deleteCourt(id) {
            if (!confirm('确定要删除这条球馆记录吗？')) return;
            let courts = getCourts();
            courts = courts.filter(c => c.id !== id);
            localStorage.setItem('myAddedCourts', JSON.stringify(courts));
            renderCourtList();
            updateStats();
            showToast('球馆已删除');
        }

        function approveCourt(id) {
            if (!confirm('确定审核通过这个球馆吗？通过后将显示在球馆列表中。')) return;
            let courts = getCourts();
            const idx = courts.findIndex(c => c.id === id);
            if (idx !== -1) {
                courts[idx].status = 'approved';
                courts[idx].approveTime = Date.now();
                localStorage.setItem('myAddedCourts', JSON.stringify(courts));
                renderCourtList();
                updateStats();
                showToast('球馆审核通过！');
            }
        }

        function rejectCourt(id) {
            if (!confirm('确定驳回这个球馆吗？球馆将被直接删除。')) return;
            let courts = getCourts();
            courts = courts.filter(c => c.id !== id);
            localStorage.setItem('myAddedCourts', JSON.stringify(courts));
            renderCourtList();
            updateStats();
            showToast('球馆已删除');
        }

        function revokeCourt(id) {
            if (!confirm('确定撤回通过状态吗？球馆将不再显示在列表中。')) return;
            let courts = getCourts();
            const idx = courts.findIndex(c => c.id === id);
            if (idx !== -1) {
                courts[idx].status = 'pending';
                localStorage.setItem('myAddedCourts', JSON.stringify(courts));
                renderCourtList();
                updateStats();
                showToast('已撤回通过状态');
            }
        }

        function editCourt(id) {
            const courts = getCourts();
            const court = courts.find(c => c.id === id);
            if (!court) return;
            
            editingCourtId = id;
            
            const districtOptions = cityDistrictMap[court.city] ? cityDistrictMap[court.city].map(d => 
                `<option value="${d}" ${d === court.district ? 'selected' : ''}>${d}</option>`
            ).join('') : '';
            
            const facilityItems = document.querySelectorAll('#facilities-group .form-checkbox-item');
            facilityItems.forEach(item => {
                const value = item.querySelector('input').value;
                item.classList.remove('checked');
                item.querySelector('input').checked = false;
                if (court.facilities.includes(value)) {
                    item.classList.add('checked');
                    item.querySelector('input').checked = true;
                }
            });
            
            document.getElementById('edit-modal-body').innerHTML = `
                <form id="edit-court-form">
                    <div class="form-group">
                        <label class="form-label">球馆名称 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="edit-name" value="${court.name}" maxlength="50">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">城市 <span class="required">*</span></label>
                            <select class="form-select" id="edit-city" onchange="updateEditDistricts()">
                                <option value="">请选择城市</option>
                                ${Object.keys(cityDistrictMap).map(city => 
                                    `<option value="${city}" ${city === court.city ? 'selected' : ''}>${city}</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">区域 <span class="required">*</span></label>
                            <select class="form-select" id="edit-district">
                                ${districtOptions}
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">详细地址 <span class="required">*</span></label>
                        <input type="text" class="form-input" id="edit-address" value="${court.address}" maxlength="100">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">人均价格（元/人）</label>
                            <input type="number" class="form-input" id="edit-price" value="${court.price || ''}" min="0" max="500">
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话</label>
                            <input type="tel" class="form-input" id="edit-phone" value="${court.phone || ''}" maxlength="20">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">交通指引</label>
                        <input type="text" class="form-input" id="edit-transit" value="${court.transit || ''}" maxlength="100">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">开放时间</label>
                        <input type="text" class="form-input" id="edit-hours" value="${court.hours || ''}" maxlength="50">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">场地数量</label>
                        <select class="form-select" id="edit-count">
                            <option value="">请选择</option>
                            <option value="1-4片" ${court.courtCount === '1-4片' ? 'selected' : ''}>1-4片</option>
                            <option value="5-8片" ${court.courtCount === '5-8片' ? 'selected' : ''}>5-8片</option>
                            <option value="9-12片" ${court.courtCount === '9-12片' ? 'selected' : ''}>9-12片</option>
                            <option value="13-20片" ${court.courtCount === '13-20片' ? 'selected' : ''}>13-20片</option>
                            <option value="20片以上" ${court.courtCount === '20片以上' ? 'selected' : ''}>20片以上</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">简介说明</label>
                        <textarea class="form-textarea" id="edit-desc" maxlength="300">${court.desc || ''}</textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存修改</button>
                    </div>
                </form>
            `;
            
            document.getElementById('edit-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            document.getElementById('edit-court-form').addEventListener('submit', function(e) {
                e.preventDefault();
                saveCourtEdit();
            });
        }

        function updateEditDistricts() {
            const city = document.getElementById('edit-city').value;
            const districtSelect = document.getElementById('edit-district');
            districtSelect.innerHTML = '<option value="">请选择区域</option>';
            
            if (city && cityDistrictMap[city]) {
                cityDistrictMap[city].forEach(district => {
                    const option = document.createElement('option');
                    option.value = district;
                    option.textContent = district;
                    districtSelect.appendChild(option);
                });
            }
        }

        function saveCourtEdit() {
            const courts = getCourts();
            const idx = courts.findIndex(c => c.id === editingCourtId);
            if (idx === -1) return;
            
            const name = document.getElementById('edit-name').value.trim();
            const city = document.getElementById('edit-city').value;
            const district = document.getElementById('edit-district').value;
            const address = document.getElementById('edit-address').value.trim();
            const price = document.getElementById('edit-price').value;
            const phone = document.getElementById('edit-phone').value.trim();
            const transit = document.getElementById('edit-transit').value.trim();
            const hours = document.getElementById('edit-hours').value.trim();
            const courtCount = document.getElementById('edit-count').value;
            const desc = document.getElementById('edit-desc').value.trim();
            
            const facilities = [];
            document.querySelectorAll('#facilities-group input:checked').forEach(input => {
                facilities.push(input.value);
            });
            
            if (!name || !city || !district || !address) {
                showToast('请填写必填项', 'error');
                return;
            }
            
            courts[idx] = {
                ...courts[idx],
                name,
                city,
                district,
                address,
                price: price ? parseInt(price) : 0,
                phone,
                transit,
                hours,
                courtCount,
                facilities,
                desc,
                updateTime: Date.now()
            };
            
            localStorage.setItem('myAddedCourts', JSON.stringify(courts));
            closeEditModal();
            renderCourtList();
            updateStats();
            showToast('修改已保存');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
            document.body.style.overflow = 'auto';
            editingCourtId = null;
        }

        window.onload = function() {
            updateStats();
            renderCourtList();
        };
    </script>
    <script>
    // 返回顶部按钮
    (function initBackToTop() {
        const btn = document.createElement('div');
        btn.className = 'back-to-top';
        btn.innerHTML = '↑';
        btn.onclick = function() { window.scrollTo({ top: 0, behavior: 'smooth' }); };
        document.body.appendChild(btn);

        window.addEventListener('scroll', function() {
            if (window.scrollY > 400) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });
    })();
    </script>
</body>
</html>
